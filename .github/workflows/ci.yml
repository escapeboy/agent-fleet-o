name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Job 1: Code Quality (fast, no DB needed)
  # ─────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Verify PHP 8.4
        run: |
          php -v
          php -r 'if (PHP_MAJOR_VERSION !== 8 || PHP_MINOR_VERSION !== 4) { echo "Expected PHP 8.4, got " . PHP_VERSION . "\n"; exit(1); }'
          composer --version

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Laravel Pint
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

  # ─────────────────────────────────────────
  # Job 2: Test Suite (SQLite in-memory)
  # ─────────────────────────────────────────
  tests:
    name: Tests
    runs-on: self-hosted
    needs: quality

    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      # Self-hosted runner has Redis bound to 127.0.0.1 (no docker-compose hostname).
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      # ext-intl not available on runner; force English locale formatting in Cashier.
      CASHIER_CURRENCY_LOCALE: en
      # Webclaw container only exists in docker-compose; tests must not call it.
      WEBCLAW_URL: http://127.0.0.1:65535

    steps:
      - uses: actions/checkout@v4

      - name: Verify PHP 8.4
        run: |
          php -v
          php -r 'if (PHP_MAJOR_VERSION !== 8 || PHP_MINOR_VERSION !== 4) { echo "Expected PHP 8.4, got " . PHP_VERSION . "\n"; exit(1); }'
          php -m | grep -E '(sqlite3|pcov|pgsql|redis)'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
          mkdir -p storage/framework/{cache,sessions,views} storage/logs
          # Self-hosted runner shares storage/framework between runs — purge stale compiled views
          # so a Blade component edit from one run doesn't leak into the next.
          rm -f storage/framework/views/*.php
          php artisan view:clear

      - name: Run tests
        run: vendor/bin/phpunit

  # ─────────────────────────────────────────
  # Job 3: Frontend Build Verification
  # ─────────────────────────────────────────
  build:
    name: Build Assets
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: npm ci && npm run build
