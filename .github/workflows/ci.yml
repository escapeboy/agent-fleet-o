name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Job 1: Code Quality (fast, no DB needed)
  # ─────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_sqlite, dom, filter, json, tokenizer, bcmath, openssl, sodium
          coverage: none

      - name: Verify PHP
        run: php -v && composer --version

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Laravel Pint
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

  # ─────────────────────────────────────────
  # Job 2: Test Suite (SQLite in-memory)
  # ─────────────────────────────────────────
  tests:
    name: Tests
    runs-on: self-hosted
    needs: quality

    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_sqlite, dom, filter, json, tokenizer, bcmath, openssl, sodium
          coverage: none

      - name: Verify PHP
        run: php -v && php -m | grep -E '(sqlite3|pcov|pgsql|redis)'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear
          mkdir -p storage/framework/{cache,sessions,views} storage/logs

      - name: Run tests
        run: vendor/bin/phpunit

  # ─────────────────────────────────────────
  # Job 3: Frontend Build Verification
  # ─────────────────────────────────────────
  build:
    name: Build Assets
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: npm ci && npm run build
