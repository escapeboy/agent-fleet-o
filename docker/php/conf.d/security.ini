; PHP Security Hardening
; Applied in both development and production stages.
; Focuses on reducing attack surface for prompt-injection-driven filesystem reads
; and information disclosure — without open_basedir (which disables realpath_cache
; and causes significant performance regression; the container boundary provides
; OS-level filesystem isolation).

; --- Information Disclosure ---
; Hide PHP version from HTTP headers and error pages.
expose_php = Off

; Disable built-in PHP info page (should not be reachable in production anyway).
; Enable errors only via logs, never via HTTP responses.
display_errors = Off
display_startup_errors = Off
log_errors = On

; --- Remote File Inclusion ---
; Prevent LLM-injected payloads from fetching and executing remote PHP files.
allow_url_fopen = Off
allow_url_include = Off

; --- Dangerous Function Disable List ---
; Prevent prompt-injection from spawning shell commands or exfiltrating data
; via system calls. phpinfo() is also disabled as a defence-in-depth measure.
;
; The shell-execution primitives listed below remain disabled — they all
; parse their argument through `/bin/sh -c`, which is the prompt-injection
; vector we are guarding against.
;
; `proc_open` is NOT disabled because:
;   1. It accepts argv as an explicit array (no shell parsing) when invoked
;      with `['cmd', 'arg1', 'arg2']`, so it does not by itself widen the
;      shell-injection surface beyond what `file_get_contents` already does.
;   2. Symfony Process — required by Composer post-install scripts, Laravel's
;      `php artisan test` runner, Vite, and Pail — uses `proc_open` directly.
;      Without it the test suite cannot run inside this container.
;   3. The remaining shell primitives still block the classic
;      prompt-driven shell-spawn chain that this file is guarding against.
;
; NOT disabled (needed by the platform):
;   - file_get_contents, file_put_contents  (local file operations, used by Laravel)
;   - curl_*                                 (outbound HTTP via Guzzle/PrismPHP)
;   - mail()                                 (Symfony Mailer fallback)
;   - proc_open                              (Symfony Process — test runner, composer)
disable_functions = "exec,passthru,shell_exec,system,popen,pcntl_exec,phpinfo"
