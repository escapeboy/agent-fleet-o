; Horizon & Scheduler override — re-enable proc_open and popen.
;
; security.ini disables these to prevent LLM-injected payloads from
; spawning shell commands via the web/FPM containers. However, Horizon
; requires proc_open (via Symfony\Component\Process) to fork worker
; sub-processes, and the scheduler may also need it for certain commands.
;
; This file is mounted ONLY into the horizon and scheduler containers
; (see docker-compose.yml) via the zz- prefix so it loads after security.ini
; and overrides disable_functions for those services.
disable_functions = "exec,passthru,shell_exec,system,pcntl_exec,phpinfo"
