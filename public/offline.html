<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetQ — Offline</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }
        .container {
            text-align: center;
            max-width: 380px;
        }
        .logo {
            width: 56px;
            height: 56px;
            background: #2563eb;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .logo svg {
            width: 32px;
            height: 32px;
            color: white;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.75rem;
            color: #f1f5f9;
        }
        p {
            color: #94a3b8;
            margin: 0 0 2rem;
            line-height: 1.6;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9375rem;
            font-weight: 500;
            transition: background 0.15s;
        }
        button:hover { background: #1d4ed8; }
        .status {
            margin-top: 1.5rem;
            font-size: 0.8125rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
                <circle cx="12" cy="5" r="2" fill="currentColor" stroke="none"/>
                <circle cx="5" cy="17" r="2" fill="currentColor" stroke="none"/>
                <circle cx="19" cy="17" r="2" fill="currentColor" stroke="none"/>
                <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
                <line x1="12" y1="7" x2="12" y2="9.5" stroke="currentColor"/>
                <line x1="10" y1="13.2" x2="6.8" y2="15.3" stroke="currentColor"/>
                <line x1="14" y1="13.2" x2="17.2" y2="15.3" stroke="currentColor"/>
            </svg>
        </div>
        <h1>You are offline</h1>
        <p>FleetQ requires a network connection for real-time agent monitoring and AI workflows.</p>
        <button onclick="window.location.reload()">Try again</button>
        <p class="status" id="status"></p>
    </div>
    <script>
        window.addEventListener('online', function() {
            document.getElementById('status').textContent = 'Connection restored — reloading…';
            setTimeout(() => window.location.reload(), 800);
        });
        window.addEventListener('offline', function() {
            document.getElementById('status').textContent = 'Still offline.';
        });
    </script>
</body>
</html>
