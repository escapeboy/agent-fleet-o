name: agent-fleet-open

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - /Users/katsarov/htdocs/fleetq-plugin-sdk:/Users/katsarov/htdocs/fleetq-plugin-sdk
      - /Users/katsarov/htdocs/fleetq-website-plugin-core:/Users/katsarov/htdocs/fleetq-website-plugin-core
      - /Users/katsarov/htdocs/fleetq-website-plugin-blog:/Users/katsarov/htdocs/fleetq-website-plugin-blog
      - /Users/katsarov/htdocs/fleetq-website-plugin-forms:/Users/katsarov/htdocs/fleetq-website-plugin-forms
      - /Users/katsarov/htdocs/fleetq-website-plugin-chatbot:/Users/katsarov/htdocs/fleetq-website-plugin-chatbot
      - /Users/katsarov/htdocs/fleetq-website-plugin-ecommerce:/Users/katsarov/htdocs/fleetq-website-plugin-ecommerce
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=local
      - COMPOSER_CACHE_DIR=/root/.composer
      - RUNNING_IN_DOCKER=true
    networks:
      - agent-fleet-open
      - agent-fleet-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    # container_name removed — let Compose auto-name for OrbStack DNS
    restart: unless-stopped
    # No host port needed — OrbStack routes via nginx.agent-fleet-open.orb.local
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - agent-fleet-open
    depends_on:
      - app

  postgres:
    image: pgvector/pgvector:pg17
    # container_name removed
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-agent_fleet}
      POSTGRES_USER: ${DB_USERNAME:-agent_fleet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent-fleet-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-agent_fleet}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # container_name removed
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - agent-fleet-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    # container_name removed
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - ./docker/php/conf.d/horizon.ini:/usr/local/etc/php/conf.d/zz-horizon.ini
      - /Users/katsarov/htdocs/fleetq-plugin-sdk:/Users/katsarov/htdocs/fleetq-plugin-sdk
      - /Users/katsarov/htdocs/fleetq-website-plugin-core:/Users/katsarov/htdocs/fleetq-website-plugin-core
      - /Users/katsarov/htdocs/fleetq-website-plugin-blog:/Users/katsarov/htdocs/fleetq-website-plugin-blog
      - /Users/katsarov/htdocs/fleetq-website-plugin-forms:/Users/katsarov/htdocs/fleetq-website-plugin-forms
      - /Users/katsarov/htdocs/fleetq-website-plugin-chatbot:/Users/katsarov/htdocs/fleetq-website-plugin-chatbot
      - /Users/katsarov/htdocs/fleetq-website-plugin-ecommerce:/Users/katsarov/htdocs/fleetq-website-plugin-ecommerce
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=local
      - RUNNING_IN_DOCKER=true
    networks:
      - agent-fleet-open
      - agent-fleet-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    # container_name removed
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - ./docker/php/conf.d/horizon.ini:/usr/local/etc/php/conf.d/zz-horizon.ini
      - /Users/katsarov/htdocs/fleetq-plugin-sdk:/Users/katsarov/htdocs/fleetq-plugin-sdk
      - /Users/katsarov/htdocs/fleetq-website-plugin-core:/Users/katsarov/htdocs/fleetq-website-plugin-core
      - /Users/katsarov/htdocs/fleetq-website-plugin-blog:/Users/katsarov/htdocs/fleetq-website-plugin-blog
      - /Users/katsarov/htdocs/fleetq-website-plugin-forms:/Users/katsarov/htdocs/fleetq-website-plugin-forms
      - /Users/katsarov/htdocs/fleetq-website-plugin-chatbot:/Users/katsarov/htdocs/fleetq-website-plugin-chatbot
      - /Users/katsarov/htdocs/fleetq-website-plugin-ecommerce:/Users/katsarov/htdocs/fleetq-website-plugin-ecommerce
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_ENV=local
      - RUNNING_IN_DOCKER=true
    networks:
      - agent-fleet-open
      - agent-fleet-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    # container_name removed
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5174:5173"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - node_modules:/var/www/node_modules
    networks:
      - agent-fleet-open

  reverb:
    image: agent-fleet-open-app
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    environment:
      - APP_ENV=local
      - RUNNING_IN_DOCKER=true
    networks:
      - agent-fleet-open
      - agent-fleet-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  relay:
    build:
      context: ../fleetq-bridge
      dockerfile: Dockerfile.relay
    restart: unless-stopped
    ports:
      - "${RELAY_PORT:-8070}:8070"    # exposed to host so fleetq-bridge can connect
    environment:
      FLEETQ_API_URL: "http://nginx:80"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    networks:
      - agent-fleet-open       # needs nginx + app
      - agent-fleet-internal   # needs redis
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8070/bridge/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - relay

  voice-worker:
    build:
      context: .
      dockerfile: docker/voice-worker/Dockerfile
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - LIVEKIT_URL=${LIVEKIT_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - VOICE_STT_PROVIDER=${VOICE_STT_PROVIDER:-deepgram}
      - VOICE_TTS_PROVIDER=${VOICE_TTS_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - VOICE_TTS_VOICE_ID=${VOICE_TTS_VOICE_ID:-}
      - APP_URL=http://nginx:80
    networks:
      - agent-fleet-open
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - voice

  searxng:
    image: ghcr.io/searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET_KEY:-agent-fleet-searxng-dev-key}
    networks:
      - agent-fleet-open
    profiles:
      - search

  browserless:
    image: browserless/chrome:1-chrome-stable
    restart: unless-stopped
    environment:
      MAX_CONCURRENT_SESSIONS: 5
      CONNECTION_TIMEOUT: 30000
      TOKEN: ${BROWSERLESS_TOKEN:-secret}
    networks:
      - agent-fleet-open
    profiles:
      - browser

  mjml:
    build:
      context: ./docker/mjml
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - agent-fleet-open

  bash_sidecar:
    build:
      context: ../../sidecar
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BASH_SIDECAR_SECRET: "${BASH_SIDECAR_SECRET:-dev-secret}"
    networks:
      - agent-fleet-open
    profiles:
      - sandbox  # opt-in: docker compose --profile sandbox up

volumes:
  postgres_data:
  redis_data:
  vendor_data:
  node_modules:

networks:
  agent-fleet-open:
    driver: bridge
  agent-fleet-internal:
    driver: bridge
    internal: true  # postgres/redis only — no external network access
